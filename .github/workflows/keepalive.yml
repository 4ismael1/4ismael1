name: keepalive

on:
  schedule:
    # runs at 12:00 UTC on the 1st of every month — comfortably inside the 60-day window
    - cron: "0 12 1 * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/keepalive-workflow@v2
        with:
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          use_api: true
